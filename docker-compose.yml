services:
  postgres:
    image: postgres:16
    container_name: codecook_pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: codecook
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codecook_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
